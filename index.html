<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bimba Studio — Master Timeline</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --terracotta:#C1643C;--terracotta-light:#D4845C;--terracotta-dark:#A0502E;
  --cream:#F7EDD8;--cream-dark:#EAD9BE;
  --indigo:#2D3A6E;--indigo-light:#3D4F8A;
  --sage:#7A9A72;--gold:#C9A84C;
  --text:#3A2A1A;--text-muted:#9A8070;
  --white:#FFFDF7;--line:rgba(193,100,60,.2);
  --pc:#C13C3C;--pc-bg:#FDF0F0;--pc-br:rgba(193,60,60,.3);
  --ph:#C1643C;--ph-bg:#FDF4EF;--ph-br:rgba(193,100,60,.3);
  --pm:#C9A84C;--pm-bg:#FDFAF0;--pm-br:rgba(201,168,76,.3);
  --pl:#7A9A72;--pl-bg:#F3F7F2;--pl-br:rgba(122,154,114,.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);background-image:url("data:image/svg+xml,%3Csvg width='52' height='52' viewBox='0 0 52 52' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23C1643C' fill-opacity='0.035'%3E%3Cpath d='M26 0L52 26L26 52L0 26z'/%3E%3C/g%3E%3C/svg%3E");font-family:'Jost',sans-serif;color:var(--text);min-height:100vh;}

/* HEADER */
header{background:var(--indigo);padding:40px 40px 32px;position:relative;overflow:hidden;}
header::before{content:'';position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23fff' fill-opacity='0.025'%3E%3Cpath d='M0 20L20 0L40 20L20 40z'/%3E%3C/g%3E%3C/svg%3E");pointer-events:none;}
header::after{content:'';position:absolute;bottom:0;left:40px;right:40px;height:2px;background:linear-gradient(90deg,var(--terracotta),var(--gold),var(--terracotta));border-radius:2px;}
.hdr{max-width:980px;margin:0 auto;position:relative;z-index:1;}
.brand-tag{font-size:10px;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:10px;}
.brand-tag::before{content:'';width:28px;height:1px;background:var(--gold);opacity:.5;}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,4.5vw,3.2rem);font-weight:700;color:var(--cream);line-height:1.1;}
h1 em{font-style:italic;color:var(--terracotta-light);}
.hdr-meta{margin-top:10px;font-size:12px;color:rgba(247,237,216,.45);letter-spacing:.04em;}
.hdr-row{margin-top:24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.prog-wrap{flex:1;min-width:160px;display:flex;align-items:center;gap:10px;}
.prog-track{flex:1;height:4px;background:rgba(255,255,255,.12);border-radius:99px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--terracotta),var(--gold));border-radius:99px;transition:width .5s ease;}
.prog-pct{font-size:12px;color:var(--cream);font-weight:500;min-width:32px;}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:3px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;transition:all .16s;white-space:nowrap;}
.btn-primary{background:var(--terracotta);color:#fff;}
.btn-primary:hover{background:var(--terracotta-dark);}
.btn-ghost{background:transparent;color:var(--cream);border:1px solid rgba(247,237,216,.25);}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}
.btn-sm{padding:5px 11px;font-size:10px;}
.btn-danger{background:rgba(193,60,60,.12);color:#d06060;border:1px solid rgba(193,60,60,.22);}
.btn-danger:hover{background:rgba(193,60,60,.22);}

/* FILTER BAR */
.filter-bar{background:var(--indigo-light);padding:10px 40px;border-bottom:1px solid rgba(193,100,60,.12);position:sticky;top:0;z-index:50;}
.filter-inner{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.filter-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);margin-right:4px;}
.fpill{padding:5px 13px;border-radius:99px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(247,237,216,.55);transition:all .15s;}
.fpill:hover,.fpill.active{color:#fff;border-color:transparent;}
.fpill[data-p="all"].active{background:var(--terracotta);}
.fpill[data-p="critical"].active{background:var(--pc);}
.fpill[data-p="high"].active{background:var(--ph);}
.fpill[data-p="medium"].active{background:var(--pm);}
.fpill[data-p="low"].active{background:var(--pl);}

/* MAIN */
main{max-width:980px;margin:0 auto;padding:48px 24px 80px;}

/* MONTH CARD */
.month-card{display:grid;grid-template-columns:145px 1fr;margin-bottom:50px;animation:fadeUp .35s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
.month-sidebar{padding-top:2px;padding-right:28px;position:relative;}
.month-sidebar::after{content:'';position:absolute;top:14px;right:0;bottom:-50px;width:1px;background:linear-gradient(to bottom,var(--terracotta) 0%,var(--line) 60%,transparent 100%);}
.month-card:last-child .month-sidebar::after{display:none;}
.month-dot{width:12px;height:12px;border-radius:50%;background:var(--terracotta);position:absolute;right:-6px;top:10px;box-shadow:0 0 0 3px var(--cream),0 0 0 5px var(--terracotta);}
.month-name{font-family:'Cormorant Garamond',serif;font-size:28px;font-weight:700;color:var(--terracotta);line-height:1;}
.month-year{font-size:10px;color:var(--text-muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px;}
.month-stats{margin-top:10px;font-size:11px;color:var(--text-muted);line-height:1.8;}
.month-stats span{display:block;}
.month-body{padding-left:28px;}
.month-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px;}
.month-subtitle{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--text-muted);cursor:pointer;border-bottom:1px dashed transparent;transition:border .15s;outline:none;}
.month-subtitle:hover{border-color:rgba(154,128,112,.4);}
.month-subtitle:focus{border-color:var(--terracotta);color:var(--text);}
.month-menu{display:flex;gap:5px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.month-body:hover .month-menu{opacity:1;}

/* TASK LIST */
.task-list{display:flex;flex-direction:column;gap:5px;min-height:10px;}
.task-list.drag-over{background:rgba(193,100,60,.04);border-radius:6px;outline:2px dashed rgba(193,100,60,.3);outline-offset:4px;}
.task-item{display:flex;align-items:flex-start;gap:8px;padding:11px 12px;border-radius:4px;border:1px solid var(--cream-dark);border-left-width:3px;background:var(--white);transition:box-shadow .15s,opacity .2s,transform .15s;cursor:grab;position:relative;}
.task-item:active{cursor:grabbing;}
.task-item:hover{box-shadow:0 2px 12px rgba(0,0,0,.06);}
.task-item[data-priority="critical"]{border-left-color:var(--pc);background:var(--pc-bg);}
.task-item[data-priority="high"]{border-left-color:var(--ph);background:var(--ph-bg);}
.task-item[data-priority="medium"]{border-left-color:var(--pm);background:var(--pm-bg);}
.task-item[data-priority="low"]{border-left-color:var(--pl);background:var(--pl-bg);}
.task-item.done{opacity:.45;background:rgba(138,154,114,.06)!important;border-left-color:var(--sage)!important;}
.task-item.done .task-text{text-decoration:line-through;color:var(--text-muted);}
.task-item.dragging{opacity:.3;transform:scale(.985);}
.task-item.drag-above{border-top:2px solid var(--terracotta)!important;margin-top:-1px;}
.task-item.drag-below{border-bottom:2px solid var(--terracotta)!important;}
.task-item.hidden-filter{display:none;}

/* DRAG HANDLE */
.drag-handle{display:flex;flex-direction:column;gap:2.5px;padding:3px 1px;cursor:grab;opacity:.2;transition:opacity .15s;align-self:center;flex-shrink:0;}
.task-item:hover .drag-handle{opacity:.5;}
.drag-handle span{display:block;width:14px;height:1.5px;background:var(--text);border-radius:1px;}

/* CHECKBOX */
.task-check{width:17px;height:17px;min-width:17px;border-radius:3px;border:2px solid var(--cream-dark);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;margin-top:2px;flex-shrink:0;}
.task-item[data-priority="critical"] .task-check{border-color:rgba(193,60,60,.4);}
.task-item[data-priority="high"] .task-check{border-color:rgba(193,100,60,.4);}
.task-item[data-priority="medium"] .task-check{border-color:rgba(201,168,76,.4);}
.task-item[data-priority="low"] .task-check{border-color:rgba(122,154,114,.4);}
.task-item.done .task-check{background:var(--sage);border-color:var(--sage);}
.task-check svg{display:none;}
.task-item.done .task-check svg{display:block;}

/* TASK CONTENT */
.task-content{flex:1;min-width:0;}
.task-text{font-size:13.5px;line-height:1.5;color:var(--text);outline:none;background:transparent;border:none;cursor:text;font-family:'Jost',sans-serif;width:100%;display:block;}
.task-text:focus{color:var(--indigo);}
.task-meta{display:flex;align-items:center;gap:7px;margin-top:6px;flex-wrap:wrap;}

/* PRIORITY BADGE */
.pbadge{font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:600;padding:2px 8px;border-radius:2px;cursor:pointer;transition:all .15s;border:none;font-family:'Jost',sans-serif;}
.pbadge[data-p="critical"]{color:var(--pc);background:rgba(193,60,60,.1);}
.pbadge[data-p="high"]{color:var(--ph);background:rgba(193,100,60,.1);}
.pbadge[data-p="medium"]{color:var(--pm);background:rgba(201,168,76,.1);}
.pbadge[data-p="low"]{color:var(--pl);background:rgba(122,154,114,.1);}
.pbadge:hover{filter:brightness(1.1);}

/* DATE INPUT */
.date-inp{font-size:11px;color:var(--text-muted);background:var(--cream);padding:2px 8px;border-radius:2px;border:1px solid var(--cream-dark);cursor:pointer;font-family:'Jost',sans-serif;letter-spacing:.02em;transition:border .15s;-webkit-appearance:none;}
.date-inp::-webkit-calendar-picker-indicator{opacity:.4;cursor:pointer;}
.date-inp:hover,.date-inp:focus{border-color:var(--terracotta);outline:none;color:var(--text);}
.date-inp.overdue{color:var(--pc);border-color:var(--pc-br);background:var(--pc-bg);}
.date-inp.due-soon{color:var(--ph);border-color:var(--ph-br);}

/* TASK ACTIONS */
.task-actions{display:flex;gap:2px;opacity:0;transition:opacity .15s;align-self:flex-start;flex-shrink:0;}
.task-item:hover .task-actions{opacity:1;}
.task-btn{width:24px;height:24px;display:flex;align-items:center;justify-content:center;border:none;background:transparent;cursor:pointer;border-radius:3px;color:var(--text-muted);transition:all .15s;}
.task-btn:hover{background:var(--cream-dark);color:var(--terracotta);}
.task-btn.del:hover{color:#c44;background:rgba(200,68,68,.08);}

/* ADD TASK */
.add-area{margin-top:9px;}
.add-main{display:flex;gap:6px;}
.add-sub{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;}
.add-inp{flex:1;padding:9px 12px;background:transparent;border:1px dashed rgba(193,100,60,.3);border-radius:4px;font-family:'Jost',sans-serif;font-size:13px;color:var(--text);outline:none;transition:all .15s;}
.add-inp::placeholder{color:var(--text-muted);opacity:.5;}
.add-inp:focus{border-color:var(--terracotta);background:var(--white);}
.add-sel,.add-date{padding:8px 9px;border:1px solid var(--cream-dark);border-radius:4px;font-family:'Jost',sans-serif;font-size:12px;color:var(--text);background:var(--white);outline:none;cursor:pointer;}
.add-sel:focus,.add-date:focus{border-color:var(--terracotta);}
.add-btn{padding:9px 16px;background:var(--terracotta);color:#fff;border:none;border-radius:4px;font-family:'Jost',sans-serif;font-size:11px;font-weight:600;letter-spacing:.07em;cursor:pointer;transition:all .15s;white-space:nowrap;}
.add-btn:hover{background:var(--terracotta-dark);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(20,12,4,.62);backdrop-filter:blur(4px);z-index:100;display:none;align-items:center;justify-content:center;}
.overlay.open{display:flex;animation:fadeIn .18s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal{background:var(--white);border-radius:8px;padding:36px;width:100%;max-width:480px;box-shadow:0 32px 80px rgba(0,0,0,.28);animation:slideUp .22s ease;max-height:90vh;overflow-y:auto;}
@keyframes slideUp{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700;color:var(--indigo);margin-bottom:5px;}
.modal-desc{font-size:13px;color:var(--text-muted);margin-bottom:22px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-bottom:5px;font-weight:500;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 13px;border:1px solid var(--cream-dark);border-radius:4px;font-family:'Jost',sans-serif;font-size:13.5px;color:var(--text);background:var(--cream);outline:none;transition:border .15s;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--terracotta);background:var(--white);}
.modal-actions{display:flex;gap:8px;margin-top:20px;justify-content:flex-end;}

/* SUMMARY */
.summary{max-width:980px;margin:0 auto;padding:0 24px 80px;}
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:16px;}
.sec-head h2{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;color:var(--indigo);white-space:nowrap;}
.sec-line{flex:1;height:1px;background:var(--line);}
table{width:100%;border-collapse:collapse;background:var(--white);border-radius:6px;overflow:hidden;border:1px solid var(--cream-dark);}
th{background:var(--indigo);color:var(--cream);font-size:9px;letter-spacing:.18em;text-transform:uppercase;padding:11px 14px;text-align:left;font-weight:500;}
td{padding:9px 14px;font-size:12.5px;border-bottom:1px solid var(--cream-dark);color:var(--text);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(247,237,216,.45);}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--indigo);color:var(--cream);padding:10px 20px;border-radius:4px;font-size:12.5px;letter-spacing:.04em;opacity:0;transition:all .26s;z-index:200;pointer-events:none;border-left:3px solid var(--terracotta);white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:620px){
  header{padding:28px 16px 24px;}
  main,.summary{padding-left:14px;padding-right:14px;}
  .month-card{grid-template-columns:80px 1fr;}
  .month-name{font-size:22px;}
  .filter-bar{padding:10px 14px;}
}
</style>
</head>
<body>

<header>
  <div class="hdr">
    <div class="brand-tag">Bimba Studio</div>
    <h1>Master <em>Timeline</em></h1>
    <div class="hdr-meta">April 2026 — October 2026 &nbsp;·&nbsp; <span id="hdr-count">—</span> tasks across <span id="hdr-months">—</span> months</div>
    <div class="hdr-row">
      <div class="prog-wrap">
        <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
        <span class="prog-pct" id="prog-pct">0%</span>
      </div>
      <button class="btn btn-primary" onclick="openModal('month')">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M5.5 1v9M1 5.5h9" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Add Month
      </button>
      <button class="btn btn-ghost" onclick="doReset()">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M9 5.5A3.5 3.5 0 1 1 5.5 2M5.5 2L7.5 4M5.5 2L3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Reset
      </button>
    </div>
  </div>
</header>

<div class="filter-bar">
  <div class="filter-inner">
    <span class="filter-label">Priority:</span>
    <button class="fpill active" data-p="all" onclick="setFilter('all')">All</button>
    <button class="fpill" data-p="critical" onclick="setFilter('critical')">🔴 Critical</button>
    <button class="fpill" data-p="high" onclick="setFilter('high')">🟠 High</button>
    <button class="fpill" data-p="medium" onclick="setFilter('medium')">🟡 Medium</button>
    <button class="fpill" data-p="low" onclick="setFilter('low')">🟢 Low</button>
  </div>
</div>

<main id="tl"></main>

<div class="summary">
  <div class="sec-head"><h2>All Tasks — Summary</h2><div class="sec-line"></div></div>
  <table>
    <thead><tr><th>Task</th><th>Month</th><th>Due Date</th><th>Priority</th><th>Status</th></tr></thead>
    <tbody id="sum-tbody"></tbody>
  </table>
</div>

<!-- Add Month Modal -->
<div class="overlay" id="modal-month">
  <div class="modal">
    <h2>Add a Month</h2>
    <p class="modal-desc">New month will appear at the end of the timeline.</p>
    <div class="fg"><label>Month Name</label><input id="nm-name" placeholder="e.g. November"/></div>
    <div class="fg"><label>Year</label><input id="nm-year" value="2026"/></div>
    <div class="fg"><label>Subtitle <span style="font-size:10px;opacity:.6">(optional)</span></label><input id="nm-sub" placeholder="e.g. Festive launch season"/></div>
    <div class="modal-actions">
      <button class="btn btn-ghost" style="color:var(--text-muted);border-color:var(--cream-dark)" onclick="closeModal('month')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmAddMonth()">Add Month</button>
    </div>
  </div>
</div>

<!-- Edit Task Modal -->
<div class="overlay" id="modal-task">
  <div class="modal">
    <h2>Edit Task</h2>
    <p class="modal-desc">Update task details, priority, date, or move it to another month.</p>
    <div class="fg"><label>Task Description</label><textarea id="et-text" rows="3" style="resize:vertical"></textarea></div>
    <div class="fg"><label>Due Date</label><input type="date" id="et-date"/></div>
    <div class="fg"><label>Priority</label>
      <select id="et-priority">
        <option value="critical">🔴 Critical</option>
        <option value="high">🟠 High</option>
        <option value="medium">🟡 Medium</option>
        <option value="low">🟢 Low</option>
      </select>
    </div>
    <div class="fg"><label>Move to Month</label><select id="et-month"></select></div>
    <div class="modal-actions">
      <button class="btn btn-danger btn-sm" onclick="deleteTaskFromModal()">Delete Task</button>
      <button class="btn btn-ghost" style="color:var(--text-muted);border-color:var(--cream-dark)" onclick="closeModal('task')">Cancel</button>
      <button class="btn btn-primary" onclick="confirmEditTask()">Save Changes</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const PL = {critical:'🔴 Critical',high:'🟠 High',medium:'🟡 Medium',low:'🟢 Low'};
const PO = {critical:0,high:1,medium:2,low:3};

const DEFAULT = [
  {id:'m1',name:'April',year:'2026',subtitle:'Sprint to close out all foundational work',tasks:[
     {id:'t2',text:'Batch 2 Designing — Finalize all designs; sampling brief ready',done:false,priority:'critical',date:'2026-04-18'},
     {id:'t5',text:'Buy Fabrics (Batch 2) — Procure 4 fabrics + accessories for sampling',done:false,priority:'high',date:'2026-04-18'},
    {id:'t1',text:'GEO — Complete and publish strategy; Google Business Profile live',done:false,priority:'critical',date:'2026-04-30'},
   {id:'t4',text:'GST filing — Completed',done:false,priority:'critical',date:'2026-04-30'},
    {id:'t7',text:'Buy Earrings & Accessories for Popup — All display and product accessories procured',done:false,priority:'high',date:'2026-04-30'},
    {id:'t3',text:'Trademark Registration — Application filed',done:false,priority:'critical',date:'2026-04-30'},
    {id:'t6',text:'Popup Stalls — Dates, venues, and logistics confirmed',done:false,priority:'critical',date:'2026-04-30'},
    
  ]},
  {id:'m2',name:'May',year:'2026',subtitle:'Sampling & early brand moves',tasks:[
    {id:'t8',text:'Batch 2 Sampling — Samples ordered and in progress with production partner',done:false,priority:'high',date:'2026-05-31'},
    {id:'t9',text:'Google Ads — Review campaign data; tune targeting, creatives, and budgets',done:false,priority:'medium',date:'2026-05-15'},
    {id:'t10',text:'Influencer Outreach — Identify and begin reaching out',done:false,priority:'medium',date:'2026-05-31'},
  ]},
  {id:'m3',name:'June',year:'2026',subtitle:'Production + Content push',tasks:[
    {id:'t11',text:'Batch 2 Production — Sampling approved; production run initiated',done:false,priority:'high',date:'2026-06-30'},
    {id:'t12',text:'Textile Episodes — Begin publishing "The Craft Files" Reels series (weekly)',done:false,priority:'medium',date:'2026-06-01'},
    {id:'t13',text:'Jaipur Series — Publish sourcing trip Reels; behind-the-scenes content live',done:false,priority:'medium',date:'2026-06-15'},
    {id:'t14',text:'Influencer Outreach — Collab confirmations and brief delivery',done:false,priority:'medium',date:'2026-06-30'},
  ]},
  {id:'m4',name:'July',year:'2026',subtitle:'Popup preparation',tasks:[
    {id:'t15',text:'Popup Stalls — Confirm stall dates, venues, and logistics',done:false,priority:'high',date:'2026-07-15'},
    {id:'t16',text:'Textile Episodes — Continue weekly publishing cadence',done:false,priority:'low',date:''},

  {id:'m5',name:'August',year:'2026',subtitle:'Banana Fiber — Milestone 1',tasks:[
    {id:'t17',text:'Banana Fabric — Raw fabric procured ✦ Hard deadline: Aug 15',done:false,priority:'critical',date:'2026-08-15'},
    {id:'t18',text:'Supplier confirmed (BanFab / Taruwar); fabric shipped and received',done:false,priority:'high',date:'2026-08-10'},
    {id:'t19',text:'Dye compatibility testing with Bagru/Dabu systems initiated',done:false,priority:'medium',date:'2026-08-31'},
  ]},
  {id:'m6',name:'September',year:'2026',subtitle:'Banana Fiber — Milestone 2',tasks:[
    {id:'t20',text:'Banana Fabric — First samples ready ✦ Hard deadline: Sept 30',done:false,priority:'critical',date:'2026-09-30'},
    {id:'t21',text:'Sampling done with production partner using banana/cotton blend',done:false,priority:'high',date:'2026-09-20'},
    {id:'t22',text:'Fit, drape, and wash tests completed; feedback documented',done:false,priority:'medium',date:'2026-09-30'},
  ]},
  {id:'m7',name:'October',year:'2026',subtitle:'Banana Fiber — Milestone 3',tasks:[
    {id:'t23',text:'Banana Fabric — Production ready ✦ Hard deadline: Oct 31',done:false,priority:'critical',date:'2026-10-31'},
    {id:'t24',text:'Final fabric spec locked; production brief signed off',done:false,priority:'high',date:'2026-10-20'},
    {id:'t25',text:'First production run of wellness kurti line initiated',done:false,priority:'medium',date:'2026-10-31'},
  ]},
];

let data = load();
let activeFilter = 'all';
let editingTask = null;
let dragSrc = null;

function load(){
  try{ const r=localStorage.getItem('bimba_tl_v4'); if(r) return JSON.parse(r); }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
function save(){ try{ localStorage.setItem('bimba_tl_v4',JSON.stringify(data)); }catch(e){} }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function uid(){ return 'x'+Date.now()+Math.random().toString(36).slice(2,6); }

function dateClass(d){
  if(!d) return '';
  const today=new Date(); today.setHours(0,0,0,0);
  const due=new Date(d+'T00:00:00');
  const diff=Math.round((due-today)/(864e5));
  if(diff<0) return 'overdue';
  if(diff<=7) return 'due-soon';
  return '';
}
function fmtDate(d){
  if(!d) return '—';
  return new Date(d+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function render(){
  const tl=document.getElementById('tl');
  tl.innerHTML='';
  data.forEach((m,mi)=>{
    const done=m.tasks.filter(t=>t.done).length;
    const total=m.tasks.length;
    const crits=m.tasks.filter(t=>t.priority==='critical'&&!t.done).length;
    const card=document.createElement('div');
    card.className='month-card';
    card.style.animationDelay=(mi*.055)+'s';
    card.innerHTML=`
      <div class="month-sidebar">
        <div class="month-dot"></div>
        <div class="month-name">${esc(m.name)}</div>
        <div class="month-year">${esc(m.year)}</div>
        <div class="month-stats">
          <span>${done}/${total} done</span>
          ${crits?`<span style="color:var(--pc);font-size:10px;font-weight:600">⚡ ${crits} critical</span>`:''}
        </div>
      </div>
      <div class="month-body">
        <div class="month-top">
          <div class="month-subtitle" contenteditable="true" spellcheck="false"
            onblur="saveSubtitle('${m.id}',this)"
            title="Click to edit subtitle">${esc(m.subtitle||'Click to add subtitle…')}</div>
          <div class="month-menu">
            <button class="btn btn-sm btn-danger" onclick="deleteMonth('${m.id}')">✕ Remove</button>
          </div>
        </div>
        <div class="task-list" id="tl-${m.id}" data-mid="${m.id}">
          ${m.tasks.map(t=>taskHTML(t,m.id)).join('')}
        </div>
        <div class="add-area">
          <div class="add-main">
            <input class="add-inp" id="ai-${m.id}" placeholder="Add a task…" onkeydown="handleKey(event,'${m.id}')"/>
            <button class="add-btn" onclick="addTask('${m.id}')">Add</button>
          </div>
          <div class="add-sub">
            <select class="add-sel" id="ap-${m.id}">
              <option value="high">🟠 High</option>
              <option value="critical">🔴 Critical</option>
              <option value="medium">🟡 Medium</option>
              <option value="low">🟢 Low</option>
            </select>
            <input type="date" class="add-date" id="ad-${m.id}" title="Due date"/>
          </div>
        </div>
      </div>`;
    tl.appendChild(card);
  });
  initDrag();
  applyFilter();
  updateProgress();
  updateSummary();
  updateHeaderCounts();
}

function taskHTML(t,mid){
  const dc=dateClass(t.date);
  return `<div class="task-item${t.done?' done':''}" id="ti-${t.id}"
    data-tid="${t.id}" data-mid="${mid}" data-priority="${t.priority}" draggable="true">
    <div class="drag-handle"><span></span><span></span><span></span></div>
    <div class="task-check" onclick="toggleDone('${mid}','${t.id}')">
      <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4L3.5 6.5L9 1" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="task-content">
      <div class="task-text" contenteditable="true" spellcheck="false"
        onblur="saveText('${mid}','${t.id}',this)">${esc(t.text)}</div>
      <div class="task-meta">
        <button class="pbadge" data-p="${t.priority}" onclick="cyclePriority('${mid}','${t.id}')" title="Click to change priority">${PL[t.priority]}</button>
        <input type="date" class="date-inp ${dc}" value="${t.date||''}"
          onchange="saveDate('${mid}','${t.id}',this.value)" title="Set due date"/>
        ${t.date&&dc==='overdue'?`<span style="font-size:9px;color:var(--pc);font-weight:600;letter-spacing:.05em;text-transform:uppercase">Overdue</span>`:''}
        ${t.date&&dc==='due-soon'?`<span style="font-size:9px;color:var(--ph);font-weight:600;letter-spacing:.05em;text-transform:uppercase">Due soon</span>`:''}
      </div>
    </div>
    <div class="task-actions">
      <button class="task-btn" onclick="openEditModal('${mid}','${t.id}')" title="Edit task">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M8.5 1.5l2 2-7 7H1.5v-2l7-7z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/></svg>
      </button>
      <button class="task-btn del" onclick="deleteTask('${mid}','${t.id}')" title="Delete task">
        <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M1 1l9 9M10 1L1 10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>`;
}

// ── DRAG & DROP ───────────────────────────────────────────────────────────────
function initDrag(){
  document.querySelectorAll('.task-item').forEach(el=>{
    el.addEventListener('dragstart',dragStart);
    el.addEventListener('dragend',dragEnd);
    el.addEventListener('dragover',dragOverItem);
    el.addEventListener('dragleave',dragLeaveItem);
    el.addEventListener('drop',dropOnItem);
  });
  document.querySelectorAll('.task-list').forEach(el=>{
    el.addEventListener('dragover',dragOverList);
    el.addEventListener('dragleave',dragLeaveList);
    el.addEventListener('drop',dropOnList);
  });
}
function dragStart(e){
  dragSrc=this;
  this.classList.add('dragging');
  e.dataTransfer.effectAllowed='move';
  e.dataTransfer.setData('text/plain',this.dataset.tid+'|'+this.dataset.mid);
}
function dragEnd(){
  this.classList.remove('dragging');
  document.querySelectorAll('.task-item').forEach(x=>x.classList.remove('drag-above','drag-below'));
  document.querySelectorAll('.task-list').forEach(x=>x.classList.remove('drag-over'));
  dragSrc=null;
}
function dragOverItem(e){
  e.preventDefault();e.stopPropagation();
  if(this===dragSrc) return;
  document.querySelectorAll('.task-item').forEach(x=>x.classList.remove('drag-above','drag-below'));
  const r=this.getBoundingClientRect();
  this.classList.add(e.clientY-r.top<r.height/2?'drag-above':'drag-below');
}
function dragLeaveItem(){ this.classList.remove('drag-above','drag-below'); }
function dropOnItem(e){
  e.preventDefault();e.stopPropagation();
  if(!dragSrc||this===dragSrc) return;
  const r=this.getBoundingClientRect();
  const before=e.clientY-r.top<r.height/2;
  moveTask(dragSrc.dataset.mid,dragSrc.dataset.tid,this.dataset.mid,this.dataset.tid,before);
}
function dragOverList(e){
  e.preventDefault();
  if(this.querySelectorAll('.task-item:not(.dragging)').length===0) this.classList.add('drag-over');
}
function dragLeaveList(){ this.classList.remove('drag-over'); }
function dropOnList(e){
  e.preventDefault();e.stopPropagation();
  if(!dragSrc) return;
  const tgtMid=this.dataset.mid;
  if(tgtMid===dragSrc.dataset.mid) return;
  const srcM=data.find(m=>m.id===dragSrc.dataset.mid);
  const tgtM=data.find(m=>m.id===tgtMid);
  const task=srcM.tasks.find(t=>t.id===dragSrc.dataset.tid);
  if(!task) return;
  srcM.tasks=srcM.tasks.filter(t=>t.id!==task.id);
  tgtM.tasks.push(task);
  save(); render(); toast('Moved to '+tgtM.name);
}
function moveTask(srcMid,srcTid,tgtMid,tgtTid,before){
  const srcM=data.find(m=>m.id===srcMid);
  const tgtM=data.find(m=>m.id===tgtMid);
  const task=srcM.tasks.find(t=>t.id===srcTid);
  if(!task) return;
  srcM.tasks=srcM.tasks.filter(t=>t.id!==srcTid);
  const idx=tgtM.tasks.findIndex(t=>t.id===tgtTid);
  tgtM.tasks.splice(before?idx:idx+1,0,task);
  save(); render();
  if(srcMid!==tgtMid) toast('Moved to '+tgtM.name);
}

// ── TASK ACTIONS ──────────────────────────────────────────────────────────────
function getTask(mid,tid){ return data.find(m=>m.id===mid).tasks.find(t=>t.id===tid); }
function toggleDone(mid,tid){ const t=getTask(mid,tid);t.done=!t.done;save();render();toast(t.done?'✓ Marked complete':'Reopened'); }
function saveText(mid,tid,el){ const t=getTask(mid,tid);const v=el.innerText.trim();if(v){t.text=v;save();}else el.innerText=t.text; }
function saveSubtitle(mid,el){ const m=data.find(x=>x.id===mid);const v=el.innerText.trim();if(v){m.subtitle=v;save();}else el.innerText=m.subtitle||''; }
function saveDate(mid,tid,val){ const t=getTask(mid,tid);t.date=val;save();render(); }
function cyclePriority(mid,tid){
  const t=getTask(mid,tid);
  const o=['critical','high','medium','low'];
  t.priority=o[(o.indexOf(t.priority)+1)%4];
  save();render();toast('Priority → '+PL[t.priority]);
}
function deleteTask(mid,tid){ const m=data.find(x=>x.id===mid);m.tasks=m.tasks.filter(t=>t.id!==tid);save();render();toast('Task removed'); }
function addTask(mid){
  const inp=document.getElementById('ai-'+mid);
  const text=inp.value.trim();if(!text)return;
  const priority=document.getElementById('ap-'+mid).value;
  const date=document.getElementById('ad-'+mid).value;
  data.find(x=>x.id===mid).tasks.push({id:uid(),text,done:false,priority,date});
  save();render();
  const ni=document.getElementById('ai-'+mid);if(ni){ni.focus();}
  toast('Task added');
}
function handleKey(e,mid){ if(e.key==='Enter'){e.preventDefault();addTask(mid);} }

// ── EDIT MODAL ────────────────────────────────────────────────────────────────
function openEditModal(mid,tid){
  editingTask={mid,tid};
  const t=getTask(mid,tid);
  document.getElementById('et-text').value=t.text;
  document.getElementById('et-date').value=t.date||'';
  document.getElementById('et-priority').value=t.priority;
  const sel=document.getElementById('et-month');
  sel.innerHTML=data.map(m=>`<option value="${m.id}"${m.id===mid?' selected':''}>${m.name} ${m.year}</option>`).join('');
  openModal('task');
}
function confirmEditTask(){
  if(!editingTask) return;
  const {mid,tid}=editingTask;
  const t=getTask(mid,tid);
  const newText=document.getElementById('et-text').value.trim();
  if(newText) t.text=newText;
  t.date=document.getElementById('et-date').value;
  t.priority=document.getElementById('et-priority').value;
  const newMid=document.getElementById('et-month').value;
  if(newMid!==mid){
    const srcM=data.find(m=>m.id===mid);
    const tgtM=data.find(m=>m.id===newMid);
    srcM.tasks=srcM.tasks.filter(x=>x.id!==tid);
    tgtM.tasks.push(t);
    toast('Moved to '+tgtM.name);
  }
  save();closeModal('task');render();toast('Saved ✓');
}
function deleteTaskFromModal(){ if(!editingTask)return;const{mid,tid}=editingTask;deleteTask(mid,tid);closeModal('task'); }

// ── MONTH ACTIONS ─────────────────────────────────────────────────────────────
function deleteMonth(mid){
  if(!confirm('Remove this month and all its tasks?'))return;
  data=data.filter(m=>m.id!==mid);save();render();toast('Month removed');
}
function confirmAddMonth(){
  const name=document.getElementById('nm-name').value.trim();
  const year=document.getElementById('nm-year').value.trim()||'2026';
  const subtitle=document.getElementById('nm-sub').value.trim();
  if(!name){document.getElementById('nm-name').focus();return;}
  data.push({id:uid(),name,year,subtitle,tasks:[]});
  save();closeModal('month');render();toast('Added '+name+' '+year);
  document.getElementById('nm-name').value='';
  document.getElementById('nm-sub').value='';
}

// ── FILTER ────────────────────────────────────────────────────────────────────
function setFilter(p){
  activeFilter=p;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.toggle('active',b.dataset.p===p));
  applyFilter();
}
function applyFilter(){
  document.querySelectorAll('.task-item').forEach(el=>{
    el.classList.toggle('hidden-filter',activeFilter!=='all'&&el.dataset.priority!==activeFilter);
  });
}

// ── PROGRESS + SUMMARY ────────────────────────────────────────────────────────
function updateProgress(){
  let done=0,total=0;
  data.forEach(m=>{done+=m.tasks.filter(t=>t.done).length;total+=m.tasks.length;});
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}
function updateHeaderCounts(){
  let total=0;data.forEach(m=>total+=m.tasks.length);
  document.getElementById('hdr-count').textContent=total;
  document.getElementById('hdr-months').textContent=data.length;
}
function updateSummary(){
  const rows=[];
  data.forEach(m=>m.tasks.forEach(t=>rows.push({task:t.text,month:m.name+' '+m.year,date:t.date,priority:t.priority,done:t.done})));
  rows.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    if(PO[a.priority]!==PO[b.priority]) return PO[a.priority]-PO[b.priority];
    if(a.date&&b.date) return a.date.localeCompare(b.date);
    return 0;
  });
  document.getElementById('sum-tbody').innerHTML=rows.map(r=>`<tr>
    <td style="${r.done?'text-decoration:line-through;color:var(--text-muted)':''}">${esc(r.task)}</td>
    <td><span style="background:rgba(45,58,110,.08);color:var(--indigo);font-size:11px;padding:2px 9px;border-radius:2px">${r.month}</span></td>
    <td style="font-size:12px;color:var(--text-muted);white-space:nowrap">${fmtDate(r.date)}</td>
    <td><span class="pbadge" data-p="${r.priority}" style="cursor:default">${PL[r.priority]}</span></td>
    <td style="font-size:11px;color:${r.done?'var(--sage)':'var(--text-muted)'}">${r.done?'✓ Done':'Pending'}</td>
  </tr>`).join('');
}

// ── MODALS ────────────────────────────────────────────────────────────────────
function openModal(id){ document.getElementById('modal-'+id).classList.add('open');if(id==='month')setTimeout(()=>document.getElementById('nm-name').focus(),80); }
function closeModal(id){ document.getElementById('modal-'+id).classList.remove('open');editingTask=null; }
document.querySelectorAll('.overlay').forEach(el=>el.addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');}));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') document.querySelectorAll('.overlay.open').forEach(m=>m.classList.remove('open')); });

// ── RESET ─────────────────────────────────────────────────────────────────────
function doReset(){ if(!confirm('Reset to original timeline? All changes will be lost.'))return;data=JSON.parse(JSON.stringify(DEFAULT));save();render();toast('Timeline reset'); }

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTmr;
function toast(msg){ const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(toastTmr);toastTmr=setTimeout(()=>el.classList.remove('show'),2300); }

// ── INIT ──────────────────────────────────────────────────────────────────────
render();
</script>
